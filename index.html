<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chain — Habit Tracker</title>
<meta name="description" content="A minimal, offline-first habit tracker built around the don't-break-the-chain method.">
<meta name="theme-color" content="#20262B">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chain">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* Critical, inlined so the splash paints before styles.css finishes loading.
     Kept in sync with the .splash rules in css/styles.css. */
  #splash{position:fixed;inset:0;background:#20262B;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .35s ease;}
  #splash.splash--hide{opacity:0;pointer-events:none;}
  #splash svg{width:60px;height:60px;color:#C98A3D;}
  #splash span{font-family:ui-serif,Georgia,serif;color:#E7ECEA;font-size:21px;font-weight:700;letter-spacing:-0.01em;}
</style>
</head>
<body>

<noscript>
  <div class="noscript-msg">Chain needs JavaScript enabled to track your habits and save data on this device.</div>
</noscript>

<div id="splash" aria-hidden="true">
  <svg viewBox="0 0 48 48" aria-hidden="true">
    <g fill="none" stroke="currentColor" stroke-width="4.4" stroke-linecap="round">
      <rect x="3" y="18.5" width="20" height="11" rx="5.5" transform="rotate(-35 13 24)"/>
      <rect x="22" y="18.5" width="20" height="11" rx="5.5" transform="rotate(-35 32 24)"/>
    </g>
  </svg>
  <span>Chain</span>
</div>

<div class="app">

  <p class="offline-banner" id="offlineBanner" hidden>You're offline — your data is still saved on this device.</p>

  <header class="app__header">
    <div class="app__brand">
      <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="4.4" stroke-linecap="round">
          <rect x="3" y="18.5" width="20" height="11" rx="5.5" transform="rotate(-35 13 24)"/>
          <rect x="22" y="18.5" width="20" height="11" rx="5.5" transform="rotate(-35 32 24)"/>
        </g>
      </svg>
      <h1>Chain</h1>
      <button id="installBtn" class="install-btn" hidden type="button">Install app</button>
    </div>
    <div class="app__meta">
      <p class="app__date" id="todayLabel"></p>
      <div class="app__xp" id="xpWidget">
        <span class="app__xp-label" id="xpLabel">Lv 1 · 0 XP</span>
        <div class="xp-bar"><div class="xp-bar__fill" id="xpBarFill"></div></div>
      </div>
    </div>
  </header>

  <main class="app__main">
    <section class="habit-list" id="habitList" aria-live="polite"></section>

    <p class="empty-state" id="emptyState" hidden>
      No chains started yet. Add your first habit below — the chain grows one day at a time.
    </p>
  </main>

  <form class="add-habit" id="addHabitForm">
    <input
      type="text"
      id="habitNameInput"
      name="habitName"
      placeholder="Add a habit, e.g. Read 10 pages"
      maxlength="40"
      autocomplete="off"
      required
      aria-label="New habit name">
    <button type="submit" aria-label="Add habit">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>
  </form>

</div>

<template id="habitCardTemplate">
  <article class="habit-card">
    <div class="habit-card__top">
      <h2 class="habit-card__name"></h2>
      <button class="habit-card__delete" type="button" aria-label="Delete habit">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="habit-card__streak">
      <span class="habit-card__streak-number">0</span>
      <span class="habit-card__streak-label">day streak</span>
    </div>

    <div class="habit-card__chain" aria-label="Last 7 days"></div>

    <button class="habit-card__toggle" type="button">Mark today done</button>
  </article>
</template>

<script src="js/app.js"></script>
</body>
</html>
